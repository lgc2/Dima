name: Integration Tests

on:
  push:
    branches:
      - main

jobs:
  integration-tests:
    name: Run integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore Dima.sln

      - name: Build solution
        run: dotnet build Dima.sln --configuration Release --no-restore

      - name: Run integration tests
        run: dotnet test tests/IntegrationTests/Dima.Api.IntegrationTests/Dima.Api.IntegrationTests.csproj --configuration Release --no-restore --no-build
