name: Integration Tests

on:
  push:
    branches:
      - main

jobs:
  integration-tests:
    name: Run integration tests
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: ${{ secrets.DB_PASSWORD }}
        options: --name sqlserver --hostname sqlserver -p 1433:1433

    env:
      ConnectionStrings__DefaultConnection: Server=localhost,1433;Database=Dima;User Id=sa;Password=${{ secrets.DB_PASSWORD }};TrustServerCertificate=True

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install EF Core and report tools
        run: |
          dotnet tool install --global dotnet-ef || dotnet tool update --global dotnet-ef
          dotnet tool install --global dotnet-reportgenerator-globaltool || dotnet tool update --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore dependencies
        run: dotnet restore Dima.sln

      - name: Build solution
        run: dotnet build Dima.sln --configuration Release --no-restore

      - name: Run database migrations
        run: dotnet ef database update --project Dima.Api --startup-project Dima.Api --configuration Release --no-build

      - name: Run integration tests and save TRX results
        run: |
          mkdir -p TestResults
          dotnet test tests/IntegrationTests/Dima.Api.IntegrationTests/Dima.Api.IntegrationTests.csproj \
            --configuration Release \
            --no-restore \
            --no-build \
            --logger "trx;LogFileName=integration-tests.trx" \
            --results-directory TestResults

      - name: Generate HTML report
        run: |
          reportgenerator \
            -reports:TestResults/*.trx \
            -targetdir:TestResultsReport \
            -reporttypes:"Html;HtmlSummary"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: TestResultsReport

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
